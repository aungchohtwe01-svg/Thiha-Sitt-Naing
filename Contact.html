<!DOCTYPE html>
<html>
<head>
    <title>Food Selling by Ethan - Contact</title>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

    <style>
        body{
            background:#fff8e7;
        }
        h1,h2,h3{
            font-family:Arial, sans-serif;
        }
    </style>
</head>

<body>

<!-- Header -->
<header class="w3-container w3-orange w3-center w3-padding-32">

    <img src="foodlogo.jpg" class="w3-circle" style="width:180px">

    <h1><b>🍔 Food Selling by Ethan</b></h1>

    <p>Fresh • Delicious • Affordable</p>

</header>

<!-- Navigation -->
<div class="w3-bar w3-red">

    <a href="index.html" class="w3-bar-item w3-button">Home</a>

    <a href="about.html" class="w3-bar-item w3-button">About</a>

    <a href="contact.html" class="w3-bar-item w3-button">Contact</a>

</div>

<!-- Contact Section -->
<div class="w3-container w3-padding-32">

    <div class="w3-card w3-white w3-padding">

        <h2>Contact Us</h2>

        <p>Have questions or want to order food? Send us a message!</p>

        <form>

            <label><b>Name</b></label>
            <input class="w3-input w3-border" type="text" placeholder="Your Name">

            <br>

            <label><b>Email</b></label>
            <input class="w3-input w3-border" type="email" placeholder="Your Email">

            <br>

            <label><b>Message</b></label>
            <textarea class="w3-input w3-border" rows="5" placeholder="Write your message..."></textarea>

            <br>

            <button class="w3-button w3-green">
                Send Message
            </button>

        </form>

    </div>

</div>

<!-- Footer -->
<footer class="w3-container w3-dark-grey w3-center w3-padding">

    <p>© 2026 Food Selling by Ethan</p>

    <p>Serving tasty meals with quality and care.</p>

</footer>

</body>
</html>
